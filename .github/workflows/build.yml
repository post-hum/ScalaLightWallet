name: Build Feather for Scala (XLA)

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ubuntu-legacy:
    name: "Ubuntu 20.04 (XLA)"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Fix SSL and install dependencies
        run: |
          apt update
          apt install -y --no-install-recommends \
            ca-certificates git wget build-essential cmake \
            libssl-dev libunbound-dev libboost-all-dev \
            libqrencode-dev qt5-qmake qt5-default \
            qtbase5-dev qttools5-dev-tools \
            libzip-dev libsodium-dev libx11-xcb-dev \
            protobuf-compiler libprotobuf-dev \
            libhidapi-dev libusb-1.0-0-dev libzmq3-dev \
            libpgm-dev libudev-dev pkg-config \
            libunwind-dev libreadline-dev
          update-ca-certificates --fresh
          git config --global http.sslVerify false
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build Scala library
        run: |
          cd monero

          # Просто повышаем минимальную версию CMake
          sed -i 's/cmake_minimum_required(VERSION 3.5)/cmake_minimum_required(VERSION 3.10)/' CMakeLists.txt

          rm -rf build
          mkdir -p build && cd build

          cmake -D STATIC=OFF \
                -D ARCH="x86-64" \
                -D BUILD_64=ON \
                -D CMAKE_BUILD_TYPE=Release \
                -D USE_READLINE=OFF \
                -D BUILD_TESTS=OFF \
                -D BUILD_DOCUMENTATION=OFF \
                ..

          make -j$(nproc)

          # Verify library
          if [ -f lib/libwallet_merged.a ]; then
            echo "✅ libwallet_merged.a built successfully"
            ls -la lib/libwallet_merged.a
          else
            echo "❌ libwallet_merged.a not found, available libs:"
            find . -name "*.a"
            exit 1
          fi
          cd ../..

      - name: Build Feather
        run: |
          rm -rf build
          mkdir -p build && cd build
          cmake -DWITH_SCANNER=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          make -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: feather-xla-ubuntu20
          path: build/bin/feather
