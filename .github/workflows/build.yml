name: Build Feather for Scala (XLA)

on: [push, pull_request, workflow_dispatch]

env:
  APT_SET_CONF: |
    tee -a /etc/apt/apt.conf.d/80-custom << EOF
    Acquire::Retries "3";
    Acquire::http::Timeout "120";
    Acquire::ftp::Timeout "120";
    EOF

jobs:
  build-ubuntu:
    name: "Ubuntu 22.04 (XLA)"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: set apt conf
        run: ${{env.APT_SET_CONF}}

      - name: update apt
        run: apt update

      - name: install dependencies
        run: apt -y install curl build-essential cmake libboost-all-dev miniupnpc libunbound-dev graphviz doxygen libunwind8-dev pkg-config libssl-dev libzmq3-dev libsodium-dev libhidapi-dev libusb-1.0-0-dev libprotobuf-dev protobuf-compiler ccache git

      - name: configure git
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build Scala library
        run: |
          cd monero

          # Используем стандартную сборку из Scala CI
          cmake -S . -B build \
            -D ARCH="default" \
            -D BUILD_TESTS=ON \
            -D CMAKE_BUILD_TYPE=Release

          cmake --build build --target all
          cmake --build build --target wallet_api

          # Библиотека должна появиться здесь
          ls -la build/lib/libwallet_api.a || echo "Checking alternative locations..."
          find build -name "*.a" | grep -i wallet

          cd ..

      - name: Build Feather
        run: |
          rm -rf build
          mkdir -p build && cd build
          cmake -DWITH_SCANNER=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          make -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: feather-xla-ubuntu22
          path: build/bin/feather
