name: Build Feather for Scala (XLA)

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ubuntu:
    name: "Ubuntu 22.04 (XLA)"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y --no-install-recommends \
            ca-certificates git wget build-essential cmake \
            libssl-dev libunbound-dev libboost-all-dev \
            libqrencode-dev qt5-qmake qtbase5-dev \
            qttools5-dev-tools libqt5svg5-dev \
            libzip-dev libsodium-dev libx11-xcb-dev \
            protobuf-compiler libprotobuf-dev \
            libhidapi-dev libusb-1.0-0-dev libzmq3-dev \
            libpgm-dev libudev-dev pkg-config \
            libunwind-dev libreadline-dev
          git config --global http.sslVerify false
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Kill IPFS completely
        run: |
          cd monero
          rm -rf external/libipfs
          sed -i '/libipfs/d' CMakeLists.txt
          sed -i '/IPFS/d' CMakeLists.txt
          find . -name "CMakeLists.txt" -exec sed -i '/ipfs/d' {} \;
          mkdir -p external/libipfs
          echo "add_library(libipfs INTERFACE)" > external/libipfs/CMakeLists.txt
          cd ..

      - name: Fix CMake version
        run: |
          cd monero
          sed -i 's/cmake_minimum_required(VERSION 3.5)/cmake_minimum_required(VERSION 3.10)/' CMakeLists.txt
          cd ..

      - name: Build Scala library
        run: |
          cd monero
          rm -rf build
          mkdir -p build && cd build

          cmake -D STATIC=OFF \
                -D ARCH="x86-64" \
                -D BUILD_64=ON \
                -D CMAKE_BUILD_TYPE=Release \
                -D USE_READLINE=OFF \
                -D BUILD_TESTS=OFF \
                -D BUILD_DOCUMENTATION=OFF \
                ..

          make -j$(nproc)

          # Ищем библиотеку
          find . -name "*.a" | grep -i wallet || echo "libwallet_merged.a not found"
          cd ../..

      - name: Build Feather
        run: |
          rm -rf build
          mkdir -p build && cd build
          cmake -DWITH_SCANNER=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          make -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: feather-xla
          path: build/bin/feather
