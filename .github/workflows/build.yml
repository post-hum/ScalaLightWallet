name: Build Feather for Scala (XLA)

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ubuntu:
    name: "Ubuntu 24.04 (XLA)"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y --no-install-recommends \
            wget ca-certificates git build-essential \
            libssl-dev libunbound-dev libboost-all-dev \
            libqrencode-dev qt6-base-dev qt6-svg-dev \
            qt6-websockets-dev qt6-multimedia-dev \
            qt6-wayland-dev libzip-dev libsodium-dev \
            libx11-xcb-dev protobuf-compiler libprotobuf-dev \
            libhidapi-dev libusb-1.0-0-dev libzmq3-dev \
            libpgm-dev libudev-dev pkg-config ccache

          # Install CMake 3.31
          wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.31.0/cmake-3.31.0-linux-x86_64.tar.gz" | tar --strip-components=1 -xz -C /usr/local
          export PATH=/usr/local/bin:$PATH
          echo "/usr/local/bin" >> $GITHUB_PATH
          cmake --version

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fix Boost and Scala CMake
        run: |
          cd monero

          # Отключаем статический буст
          sed -i 's/set(Boost_USE_STATIC_LIBS ON)/set(Boost_USE_STATIC_LIBS OFF)/g' CMakeLists.txt
          sed -i 's/set(Boost_USE_STATIC_RUNTIME ON)/set(Boost_USE_STATIC_RUNTIME OFF)/g' CMakeLists.txt

          # Отключаем проблемные макросы
          cat > patch.cmake << 'EOF'
          macro(forbid_undefined_symbols)
          endmacro()
          macro(check_and_set_ccache)
          endmacro()
          EOF
          sed -i '1i include(patch.cmake)' CMakeLists.txt

          # Повышаем версию CMake
          sed -i 's/cmake_minimum_required(VERSION 3.[0-9]\+)/cmake_minimum_required(VERSION 3.20)/g' CMakeLists.txt
          sed -i 's/cmake_minimum_required(VERSION 2.8.12)/cmake_minimum_required(VERSION 3.20)/g' external/miniupnp/miniupnpc/CMakeLists.txt

          cd ..

      - name: Build Scala library
        run: |
          cd monero
          rm -rf build
          mkdir -p build && cd build

          export PATH=/usr/local/bin:$PATH
          cmake -D STATIC=OFF \
                -D ARCH="x86-64" \
                -D BUILD_64=ON \
                -D CMAKE_BUILD_TYPE=Release \
                -D USE_READLINE=OFF \
                -D BUILD_TESTS=OFF \
                -D BUILD_DOCUMENTATION=OFF \
                ..

          make -j$(nproc)
          ls -la lib/libwallet_merged.a || find . -name "*.a" | head -10
          cd ../..

      - name: Build Feather
        run: |
          rm -rf build
          mkdir -p build && cd build
          export PATH=/usr/local/bin:$PATH
          cmake -DWITH_SCANNER=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          make -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: feather-xla
          path: build/bin/feather
