name: Build Feather for Scala (XLA)

on: [push, pull_request, workflow_dispatch]

jobs:
  build-ubuntu:
    name: "Ubuntu 24.04 (XLA)"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: update apt
        run: |
          apt update
          apt upgrade -y
      - name: install dependencies
        run: |
          apt install -y \
            git cmake build-essential ccache \
            libssl-dev libunbound-dev libboost-all-dev \
            libqrencode-dev qt6-base-dev qt6-svg-dev \
            qt6-websockets-dev qt6-multimedia-dev \
            qt6-wayland-dev libzip-dev libsodium-dev \
            libgcrypt20-dev libx11-xcb-dev protobuf-compiler \
            libprotobuf-dev libhidapi-dev libzxing-dev \
            libusb-dev libusb-1.0-0-dev
      - name: Install newer CMake
        run: |
          apt remove -y cmake
          wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.29.3/cmake-3.29.3-linux-x86_64.tar.gz" | tar --strip-components=1 -xz -C /usr/local
          export PATH=/usr/local/bin:$PATH
          cmake --version
      - name: configure git
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Build Scala library (libwallet_merged.a)
        run: |
          cd monero
          # Переключаемся на ветку, совместимую с новым Boost
          git checkout master || git checkout release-v0.18
          git pull origin master || git pull origin release-v0.18
          git submodule update --init --force --recursive

          # Правка CMakeLists.txt для совместимости
          sed -i '1i cmake_policy(SET CMP0148 NEW)\ncmake_policy(SET CMP0167 NEW)\nset(CMAKE_POLICY_VERSION_MINIMUM 3.5)\n' CMakeLists.txt

          mkdir -p build/release && cd build/release
          cmake -D STATIC=ON \
                -D ARCH="x86-64" \
                -D BUILD_64=ON \
                -D CMAKE_BUILD_TYPE=Release \
                -D CMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ../..
          make -j$(nproc)
          # Проверяем создание библиотеки
          ls -la lib/libwallet_merged.a || find . -name "*.a" | grep -i wallet
          cd ../..
      - name: Patch root CMakeLists.txt for compatibility
        run: |
          # Добавляем политики в корневой CMakeLists.txt Feather
          sed -i '1i cmake_policy(SET CMP0148 NEW)\ncmake_policy(SET CMP0167 NEW)\nset(CMAKE_POLICY_VERSION_MINIMUM 3.5)\n' CMakeLists.txt
      - name: Build Feather
        run: |
          mkdir -p build && cd build
          export PATH=/usr/local/bin:$PATH
          cmake -DWITH_SCANNER=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ..
          cmake --build . -j $(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: feather-xla-ubuntu-latest
          path: build/bin/feather

  build-macos:
    name: "macOS (Apple Silicon/Intel)"
    runs-on: macos-14 # macOS 14 Sonoma с лучшей поддержкой ARM64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: install dependencies
        run: |
          brew update
          brew install --quiet \
            qt@6 libsodium libzip qrencode unbound \
            cmake boost hidapi openssl expat \
            libunwind-headers protobuf pkgconfig
          brew link --overwrite qt@6
      - name: Build Scala library
        run: |
          cd monero
          git checkout master || git checkout release-v0.18
          git pull origin master || git pull origin release-v0.18
          git submodule update --init --force --recursive

          # Добавляем политики в CMakeLists.txt Scala
          sed -i '' '1i\
          cmake_policy(SET CMP0148 NEW)\
          cmake_policy(SET CMP0167 NEW)\
          set(CMAKE_POLICY_VERSION_MINIMUM 3.5)\
          ' CMakeLists.txt

          mkdir -p build/release && cd build/release
          cmake -D STATIC=OFF \
                -D CMAKE_BUILD_TYPE=Release \
                -D CMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ../..
          make -j$(sysctl -n hw.logicalcpu)
          cd ../..
      - name: Patch Feather CMakeLists for macOS
        run: |
          sed -i '' '1i\
          cmake_policy(SET CMP0148 NEW)\
          cmake_policy(SET CMP0167 NEW)\
          set(CMAKE_POLICY_VERSION_MINIMUM 3.5)\
          ' CMakeLists.txt
      - name: build feather
        run: |
          mkdir -p build && cd build
          cmake -DWITH_SCANNER=OFF \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ..
          cmake --build . -j $(sysctl -n hw.logicalcpu)
      - uses: actions/upload-artifact@v4
        with:
          name: feather-xla-macos
          path: build/bin/feather

